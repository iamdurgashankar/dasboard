<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevInquire Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #020617;
      /* Slate 950 */
    }

    body {
      font-family: 'Inter', sans-serif;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #4b5563;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #6b7280;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 10px;
    }

    .custom-scrollbar:hover::-webkit-scrollbar-thumb {
      background: #334155;
    }

    .prose pre {
      background: transparent !important;
      border: none !important;
      padding: 0 !important;
      margin: 0 !important;
    }

    .prose code {
      font-family: 'JetBrains Mono', monospace;
    }

    .prose h1,
    .prose h2,
    .prose h3 {
      font-weight: 700;
      color: #f8fafc;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .prose h1 {
      font-size: 1.5rem;
    }

    .prose h2 {
      font-size: 1.25rem;
    }

    .prose h3 {
      font-size: 1.125rem;
    }

    .prose p {
      margin-bottom: 1rem;
      line-height: 1.6;
      color: #cbd5e1;
    }

    .prose ul,
    .prose ol {
      margin-left: 1.5rem;
      margin-bottom: 1rem;
      list-style-type: disc;
    }

    .prose li {
      margin-bottom: 0.25rem;
    }

    .prose table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.875rem;
    }

    .prose th,
    .prose td {
      border: 1px solid #1e293b;
      padding: 0.5rem 0.75rem;
    }

    .prose th {
      background: #1e293b;
      text-align: left;
      color: #f8fafc;
    }

    .prose a {
      color: #6366f1;
      text-decoration: underline;
    }

    .prose blockquote {
      border-left: 4px solid #4f46e5;
      padding-left: 1rem;
      font-style: italic;
      color: #94a3b8;
      margin: 1rem 0;
    }

    @keyframes grid-move {
      0% {
        background-position: 0 0;
      }

      100% {
        background-position: 50px 50px;
      }
    }

    .cyber-grid {
      background-image:
        linear-gradient(to right, rgba(99, 102, 241, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: grid-move 20s linear infinite;
    }

    .scanline {
      width: 100%;
      height: 100px;
      background: linear-gradient(0deg, rgba(99, 102, 241, 0) 0%, rgba(99, 102, 241, 0.1) 50%, rgba(99, 102, 241, 0) 100%);
      position: absolute;
      top: -100px;
      left: 0;
      animation: scan 8s linear infinite;
      pointer-events: none;
    }

    @keyframes scan {
      0% {
        top: -100px;
      }

      100% {
        top: 100%;
      }
    }

    .section-reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
      backface-visibility: hidden;
      will-change: opacity, transform;
    }

    .section-reveal.active {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.sh/@google/genai@^1.35.0",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "react-router-dom": "https://esm.sh/react-router-dom@^7.12.0",
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "recharts": "https://esm.sh/recharts@^3.6.0",
        "react-markdown": "https://esm.sh/react-markdown@^9.0.0",
        "remark-gfm": "https://esm.sh/remark-gfm@^4.0.0",
        "react-syntax-highlighter": "https://esm.sh/react-syntax-highlighter@^16.1.0",
        "react-syntax-highlighter/": "https://esm.sh/react-syntax-highlighter@^16.1.0/"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-slate-950 text-slate-100 antialiased">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
